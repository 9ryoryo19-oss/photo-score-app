<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログインテスト</title>
</head>
<body style="background:#111;color:white;font-family:sans-serif;padding:40px">
<h2>ログインテスト</h2>
<input id="email" type="email" placeholder="メール" style="display:block;width:100%;padding:12px;margin:8px 0;background:#222;color:white;border:1px solid #444;border-radius:8px;font-size:1rem"><br>
<input id="pass" type="password" placeholder="パスワード" style="display:block;width:100%;padding:12px;margin:8px 0;background:#222;color:white;border:1px solid #444;border-radius:8px;font-size:1rem"><br>
<button id="btn" style="width:100%;padding:15px;background:#c8a96e;border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer">ログイン</button>
<div id="msg" style="margin-top:16px;padding:12px;border-radius:8px;display:none"></div>

<script>
document.getElementById('btn').onclick = function() {
  document.getElementById('msg').style.display = 'block';
  document.getElementById('msg').style.background = '#333';
  document.getElementById('msg').textContent = 'ボタンが押されました！';
};
</script>
</body>
</html>
