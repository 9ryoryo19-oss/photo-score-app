<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📸 PhotoGrow</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --accent: #c8a96e;
      --accent2: #e8c88e;
      --text: #f0ede8;
      --text2: #a09890;
      --border: #2a2a38;
      --gold: #c8a96e;
      --success: #5cb88a;
      --danger: #e07070;
      --radius: 16px;
      --shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== AUTH ===== */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 50% 0%, #1a1530 0%, var(--bg) 70%);
      position: relative;
      z-index: 500;
    }

    .auth-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .auth-tagline {
      color: var(--text2);
      font-size: 0.95rem;
      margin-bottom: 48px;
      text-align: center;
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text2);
    }

    .auth-switch span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    .auth-error {
      background: rgba(224,112,112,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    /* ===== MAIN APP ===== */
    #app { display: none; min-height: 100vh; padding-bottom: 80px; position: relative; z-index: 1; }

    /* Header */
    .app-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      cursor: pointer;
      transition: color 0.2s;
      color: var(--text2);
      font-size: 0.7rem;
      font-weight: 500;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.4rem; }

    /* Pages */
    .page { display: none; padding: 20px; }
    .page.active { display: block; }

    /* ===== HOME PAGE ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 12px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text2);
      margin-top: 4px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* Badge */
    .badges-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 24px;
      scrollbar-width: none;
    }

    .badge-item {
      flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      min-width: 80px;
    }

    .badge-item.earned { border-color: var(--gold); }
    .badge-icon { font-size: 1.8rem; }
    .badge-name { font-size: 0.65rem; color: var(--text2); margin-top: 4px; }
    .badge-item.earned .badge-name { color: var(--gold); }

    /* Chart */
    .chart-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    /* ===== UPLOAD PAGE ===== */
    .upload-area {
      background: var(--bg2);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
      position: relative;
    }

    .upload-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .upload-btn-card {
      background: var(--bg3);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-btn-card:active { border-color: var(--accent); background: var(--bg2); }
    .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .upload-text { font-size: 0.9rem; color: var(--text2); font-weight: 500; }

    .preview-container {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      display: none;
    }

    .preview-container img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: var(--radius);
    }

    .preview-remove {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Score Result */
    .score-result {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      display: none;
    }

    .score-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--score) * 3.6deg), var(--bg3) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }

    .score-circle::before {
      content: '';
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg2);
    }

    .score-number {
      position: relative;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      z-index: 1;
    }

    .score-grade {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .score-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .score-item {
      background: var(--bg3);
      border-radius: 10px;
      padding: 12px;
    }

    .score-item-name {
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .score-bar-wrap {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    .score-item-val {
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 4px;
      color: var(--accent);
    }

    .advice-section { margin-top: 16px; }
    .advice-title { font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .advice-text { font-size: 0.9rem; line-height: 1.6; color: var(--text); }

    .btn-save {
      width: 100%;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:active { transform: scale(0.98); }

    /* ===== GALLERY ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .gallery-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:active { transform: scale(0.97); }

    .gallery-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .gallery-info {
      padding: 10px;
    }

    .gallery-score {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--accent);
    }

    .gallery-date {
      font-size: 0.72rem;
      color: var(--text2);
      margin-top: 2px;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .delete-btn:active { opacity: 1; }

    /* Detail Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }

    .modal.open { display: flex; }

    .modal-content {
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
      max-height: 250px;
      object-fit: cover;
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      color: var(--text);
      z-index: 300;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Rank badge */
    .rank-banner {
      background: linear-gradient(135deg, #1a1530, #0a0a0f);
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .rank-icon { font-size: 2.5rem; }

    .rank-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
    }

    .rank-desc { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }

    .page-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: var(--text);
    }

    .sort-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .sort-tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .sort-tab.active {
      background: var(--accent);
      color: #0a0a0f;
      border-color: var(--accent);
      font-weight: 600;
    }
  
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">📸 PhotoGrow</div>
  <div class="auth-tagline">風景写真で成長する、あなたの記録</div>
  <div class="auth-card">
    <div class="auth-title" id="auth-title">ログイン</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group" id="name-group" style="display:none">
      <label>ニックネーム</label>
      <input type="text" id="input-name" placeholder="あなたの名前">
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="input-email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="input-password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="auth-btn">ログイン</button>
    <div class="auth-switch" id="auth-switch">
      アカウントがない方は <span onclick="toggleAuthMode()">新規登録</span>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <div class="app-header-logo">📸 PhotoGrow</div>
    <div class="user-avatar" id="user-avatar" onclick="handleLogout()">？</div>
  </header>

  <div class="page active" id="page-home">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-count">0</div>
        <div class="stat-label">撮影枚数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-label">平均スコア</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-best">—</div>
        <div class="stat-label">最高スコア</div>
      </div>
    </div>
    <div class="rank-banner" id="rank-banner">
      <div class="rank-icon" id="rank-icon">🌱</div>
      <div>
        <div class="rank-name" id="rank-name">ビギナー</div>
        <div class="rank-desc" id="rank-desc">まずは1枚目を撮ってみよう！</div>
      </div>
    </div>
    <div class="section-title">🏅 バッジ</div>
    <div class="badges-row" id="badges-row"></div>
    <div class="section-title">📈 スコア推移</div>
    <div class="chart-card">
      <canvas id="score-chart" height="180"></canvas>
    </div>
  </div>

  <div class="page" id="page-upload">
    <div class="page-header">写真を採点する</div>
    <div id="upload-area">
      <div class="upload-btn-row">
        <div class="upload-btn-card" onclick="document.getElementById('file-input-library').click()">
          <input type="file" id="file-input-library" accept="image/*" style="display:none">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text">写真ライブラリ</div>
        </div>
        <div class="upload-btn-card" onclick="document.getElementById('file-input-camera').click()">
          <input type="file" id="file-input-camera" accept="image/*" capture="environment" style="display:none">
          <div class="upload-icon">📷</div>
          <div class="upload-text">カメラで撮影</div>
        </div>
      </div>
    </div>
    <div class="preview-container" id="preview-container">
      <img id="preview-img" src="" alt="プレビュー">
      <button class="preview-remove" onclick="removePreview()">✕</button>
    </div>
    <div class="loading" id="scoring-loading">
      <div class="spinner"></div>
      <div>採点中...</div>
    </div>
    <div class="score-result" id="score-result">
      <div class="score-circle" id="score-circle">
        <div class="score-number" id="score-number">0</div>
      </div>
      <div class="score-grade" id="score-grade">—</div>
      <div class="score-breakdown" id="score-breakdown"></div>
      <div class="advice-section">
        <div class="advice-title">💡 アドバイス</div>
        <div class="advice-text" id="advice-text"></div>
      </div>
      <button class="btn-save" id="btn-save" onclick="savePhoto()" style="margin-top:20px">
        💾 成長記録に保存する
      </button>
    </div>
  </div>

  <div class="page" id="page-gallery">
    <div class="page-header">ギャラリー</div>
    <div class="sort-tabs">
      <div class="sort-tab active" id="tab-latest" onclick="switchSort('latest')">🕐 最新順</div>
      <div class="sort-tab" id="tab-score" onclick="switchSort('score')">🏆 高得点順</div>
    </div>
    <div class="loading" id="gallery-loading">
      <div class="spinner"></div>
      <div>読み込み中...</div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
    <div class="empty-state" id="gallery-empty" style="display:none">
      <div class="empty-icon">🖼️</div>
      <div>まだ写真がありません</div>
      <div style="font-size:0.85rem;margin-top:8px">採点して保存してみよう！</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchPage('home')">
      <span class="nav-icon">🏠</span>ホーム
    </div>
    <div class="nav-item" id="nav-upload" onclick="switchPage('upload')">
      <span class="nav-icon">📷</span>採点
    </div>
    <div class="nav-item" id="nav-gallery" onclick="switchPage('gallery')">
      <span class="nav-icon">🖼️</span>ギャラリー
    </div>
  </nav>
</div>

<!-- Detail Modal -->
<div class="modal" id="detail-modal" onclick="closeModalBg(event)">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="document.getElementById('detail-modal').classList.remove('open')">✕</button>
    <img class="modal-img" id="modal-img" src="" alt="" onerror="this.onerror=null;this.style.background='var(--bg3)'">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--accent)" id="modal-score"></div>
      <div>
        <div style="font-weight:600" id="modal-grade"></div>
        <div style="font-size:0.8rem;color:var(--text2)" id="modal-date"></div>
      </div>

// ===== SCORING ENGINE =====
async function analyzeAndScore(imageEl) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const MAX = 200;
    const scale = Math.min(MAX / imageEl.naturalWidth, MAX / imageEl.naturalHeight, 1);
    canvas.width = imageEl.naturalWidth * scale;
    canvas.height = imageEl.naturalHeight * scale;
    ctx.drawImage(imageEl, 0, 0, canvas.width, canvas.height);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const pixels = data.length / 4;

    let rSum=0, gSum=0, bSum=0;
    let brightnessValues = [];
    let satValues = [];
    let contrastData = [];

    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      rSum += r; gSum += g; bSum += b;

      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      const brightness = (max + min) / 2 / 255;
      brightnessValues.push(brightness);

      const sat = max === 0 ? 0 : (max - min) / max;
      satValues.push(sat);
      contrastData.push((r + g + b) / 3);
    }

    // 明るさスコア（0.35〜0.65が理想）
    const avgBrightness = brightnessValues.reduce((a,b)=>a+b,0) / pixels;
    const brightScore = Math.round(100 - Math.abs(avgBrightness - 0.5) * 160);

    // 彩度スコア
    const avgSat = satValues.reduce((a,b)=>a+b,0) / pixels;
    const satScore = Math.round(Math.min(avgSat * 180, 100));

    // コントラストスコア
    const meanContrast = contrastData.reduce((a,b)=>a+b,0) / pixels;
    const variance = contrastData.reduce((a,b)=>a + Math.pow(b-meanContrast, 2), 0) / pixels;
    const contrastScore = Math.round(Math.min(Math.sqrt(variance) / 60 * 100, 100));

    // 構図スコア（アスペクト比による）
    const aspect = imageEl.naturalWidth / imageEl.naturalHeight;
    const idealAspects = [1, 4/3, 3/2, 16/9];
    const aspectDiff = Math.min(...idealAspects.map(a => Math.abs(aspect - a)));
    const compositionScore = Math.round(Math.max(100 - aspectDiff * 80, 40));

    // シャープネス（エッジ検出の簡易版）
    let edgeSum = 0;
    for (let y = 1; y < canvas.height - 1; y++) {
      for (let x = 1; x < canvas.width - 1; x++) {
        const idx = (y * canvas.width + x) * 4;
        const curr = contrastData[y * canvas.width + x];
        const right = contrastData[y * canvas.width + x + 1];
        const down = contrastData[(y+1) * canvas.width + x];
        edgeSum += Math.abs(curr - right) + Math.abs(curr - down);
      }
    }
    const avgEdge = edgeSum / (canvas.width * canvas.height);
    const sharpnessScore = Math.round(Math.min(avgEdge / 15 * 100, 100));

    // 総合スコア
    const total = Math.round(
      brightScore * 0.25 +
      satScore * 0.20 +
      contrastScore * 0.20 +
      compositionScore * 0.20 +
      sharpnessScore * 0.15
    );

    const scores = {
      total: Math.max(20, Math.min(total, 100)),
      brightness: Math.max(20, brightScore),
      saturation: Math.max(20, satScore),
      contrast: Math.max(20, contrastScore),
      composition: Math.max(20, compositionScore),
      sharpness: Math.max(20, sharpnessScore),
    };

    // アドバイス生成（厳しく詳細に）
    const advices = [];

    // 明るさ
    if (scores.brightness < 35) advices.push('【明るさ：深刻】写真全体が暗すぎます。マジックアワー（日の出・日没直後）やゴールデンアワーを狙うか、露出補正を+1〜2段上げてください。暗い写真は後処理でも限界があります。');
    else if (scores.brightness < 50) advices.push('【明るさ：不足】露出が足りていません。カメラのISOを上げるか、シャッタースピードを遅くして光を多く取り込みましょう。風景では三脚を使った長秒露光も有効です。');
    else if (scores.brightness > 88) advices.push('【明るさ：飛びすぎ】白飛びしている可能性が高いです。露出補正を-1段下げ、ハイライトを守ってください。空の白飛びは後処理では回復不可能です。');
    else if (scores.brightness > 75) advices.push('【明るさ：やや明るい】少し露出オーバーです。-0.3〜-0.7段絞ることで、空や雲のディテールを保持できます。');
    else advices.push('【明るさ：良好】露出は適切です。次は光の方向性（順光・逆光・サイド光）を意識すると、さらに立体感のある写真になります。');

    // 彩度
    if (scores.saturation < 25) advices.push('【彩度：非常に低い】色味がほぼない状態です。モノクロ写真として仕上げるか、晴天の青空や夕焼けを背景に撮影しましょう。曇りの日は意図的にモノクロ変換が効果的です。');
    else if (scores.saturation < 45) advices.push('【彩度：不足】色の鮮やかさが足りません。被写体の色が映える時間帯（午前・夕方）を選ぶか、編集で彩度を+20〜30上げてみましょう。ただし不自然な過彩度は避けること。');
    else if (scores.saturation > 80) advices.push('【彩度：鮮やか】色彩が豊かで視線を引きます。ただし彩度が高すぎると不自然に見えることも。プリントや画面環境によって見え方が変わるので確認を。');
    else advices.push('【彩度：良好】色のバランスが取れています。ホワイトバランスを被写体の色温度に合わせると、さらに自然な発色になります。');

    // コントラスト
    if (scores.contrast < 30) advices.push('【コントラスト：非常に低い】全体的にのっぺりした印象です。RAW撮影してトーンカーブで暗部を下げ明部を上げるS字カーブをかけましょう。または偏光フィルターを使って反射を抑えると効果的です。');
    else if (scores.contrast < 50) advices.push('【コントラスト：不足】明暗差が少なく、立体感に欠けます。被写体に対して横から光を当てるサイド光を意識し、影を活かした構図にしましょう。');
    else if (scores.contrast > 80) advices.push('【コントラスト：強い】ダイナミックな仕上がりです。ただし暗部が潰れていないか確認を。HDR合成や段階露出で暗部を補うとバランスが取れます。');
    else advices.push('【コントラスト：良好】明暗のバランスが取れています。被写体の質感を出すには、光の角度を変えてみることをおすすめします。');

    // シャープネス
    if (scores.sharpness < 30) advices.push('【シャープネス：深刻】明らかにブレています。三脚必須です。またシャッタースピードを被写体の動きに合わせて設定し（動体なら1/500秒以上）、セルフタイマーやリモコンでシャッターを切りましょう。');
    else if (scores.sharpness < 50) advices.push('【シャープネス：不足】ピントが甘いか手ブレがあります。一眼カメラではAFポイントを主題に合わせ、iPhoneでは画面タップでピント合わせを確認してください。');
    else if (scores.sharpness > 75) advices.push('【シャープネス：優秀】くっきりと解像しています。主題を際立たせるために、前景と背景のボケ（深度）も意識してみましょう。');
    else advices.push('【シャープネス：良好】ピントは合っています。次は被写界深度（どこからどこまでピントを合わせるか）をコントロールすることを意識しましょう。');

    // 総合評価
    if (scores.total >= 85) advices.push('【総合】プロレベルに近い仕上がりです。光・構図・色の三要素が高水準で揃っています。SNSや作品展示にも十分通用します。');
    else if (scores.total >= 70) advices.push('【総合】上級アマチュアレベルです。あと一歩の完成度。弱点の項目に集中して改善すれば、大きくスコアが上がります。');
    else if (scores.total >= 55) advices.push('【総合】中級者レベルです。基本は押さえられていますが、光の読み方と構図の意図が弱い。撮影前に「何を伝えたいか」を決めてからシャッターを切る習慣をつけましょう。');
    else if (scores.total >= 40) advices.push('【総合】初級者レベルです。今は量より質を意識して。1回の外出で100枚撮るより、10枚を丁寧に撮る練習をしてください。三分割法を意識した構図から始めましょう。');
    else advices.push('【総合】基礎から見直しが必要です。まずは晴れた日の昼間に、明るく・ブレない写真を撮ることだけを目標にしてください。設定はフルオートでOKです。');

    scores.advice = advices.join('

');
    resolve(scores);
  });
}

async function savePhoto() {
  if (!pendingImageData || !pendingScoreData) return;
  const btn = document.getElementById('btn-save');
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    let imageUrl = '';
    const blob = dataURLtoBlob(pendingImageData);
    const fd = new FormData();
    fd.append('file', blob);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {method:'POST', body:fd});
    if (r.ok) {
      const d = await r.json();
      imageUrl = d.secure_url;
    } else {
      imageUrl = await compressImage(pendingImageData, 400);
    }
    const { error } = await _supabase.from('photos').insert({
      user_id: currentUser.id,
      image_url: imageUrl,
      score: pendingScoreData.total,
      brightness: pendingScoreData.brightness,
      saturation: pendingScoreData.saturation,
      contrast: pendingScoreData.contrast,
      composition: pendingScoreData.composition,
      sharpness: pendingScoreData.sharpness,
      advice: pendingScoreData.advice,
      created_at: new Date().toISOString()
    });
    if (error) throw error;
    showToast('✅ 保存しました！');
    removePreview();
    await loadHomeStats();
    switchPage('gallery');
  } catch(err) {
    showToast('保存失敗: ' + err.message);
  }
  btn.textContent = '💾 成長記録に保存する';
  btn.disabled = false;
}

function dataURLtoBlob(dataURL) {
  const arr = dataURL.split(','), mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8 = new Uint8Array(n);
  while (n--) u8[n] = bstr.charCodeAt(n);
  return new Blob([u8], {type: mime});
}

async function compressImage(dataURL, maxSize) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      res(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = dataURL;
  });
}

async function loadHomeStats() {
  const { data } = await _supabase.from('photos').select('score,created_at').eq('user_id', currentUser.id).order('created_at', {ascending:true});
  if (!data) return;
  const count = data.length;
  const avg = count > 0 ? Math.round(data.reduce((s,p) => s+p.score, 0) / count) : null;
  const best = count > 0 ? Math.max(...data.map(p => p.score)) : null;
  document.getElementById('stat-count').textContent = count;
  document.getElementById('stat-avg').textContent = avg ?? '—';
  document.getElementById('stat-best').textContent = best ?? '—';
  updateRank(avg||0, count);
  updateBadges(count, best||0, avg||0);
  updateChart(data);
}

function updateRank(avg, count) {
  let icon, name, desc;
  if (count===0){icon='🌱';name='ビギナー';desc='まずは1枚目を撮ってみよう！';}
  else if (avg<50){icon='📷';name='カメラ初心者';desc='基礎をマスターしよう！';}
  else if (avg<60){icon='🎯';name='アマチュア';desc='もう少し上を目指そう';}
  else if (avg<70){icon='📸';name='フォトグラファー';desc='構図と光を意識しよう';}
  else if (avg<80){icon='✨';name='エキスパート';desc='素晴らしいセンスです！';}
  else{icon='🌟';name='マスター';desc='あなたはプロ級！';}
  document.getElementById('rank-icon').textContent = icon;
  document.getElementById('rank-name').textContent = name;
  document.getElementById('rank-desc').textContent = desc;
}

function updateBadges(count, best, avg) {
  const defs = [
    {icon:'📸',name:'初撮り',earned:count>=1},
    {icon:'🔟',name:'10枚達成',earned:count>=10},
    {icon:'💯',name:'100枚の旅',earned:count>=100},
    {icon:'⭐',name:'初60点',earned:best>=60},
    {icon:'🌟',name:'80点超え',earned:best>=80},
    {icon:'👑',name:'90点超え',earned:best>=90},
    {icon:'📈',name:'平均60以上',earned:avg>=60},
    {icon:'🏆',name:'平均75以上',earned:avg>=75},
  ];
  document.getElementById('badges-row').innerHTML = defs.map(b =>
    `<div class="badge-item ${b.earned?'earned':''}">
      <div class="badge-icon" style="opacity:${b.earned?1:0.3}">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`
  ).join('');
}

function updateChart(data) {
  const ctx = document.getElementById('score-chart').getContext('2d');
  if (scoreChart) scoreChart.destroy();
  if (!data.length) return;
  scoreChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map((_,i) => `#${i+1}`),
      datasets: [{
        data: data.map(p => p.score),
        borderColor: '#c8a96e', backgroundColor: 'rgba(200,169,110,0.1)',
        borderWidth: 2, pointBackgroundColor: '#c8a96e', pointRadius: 4,
        tension: 0.4, fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {legend:{display:false}},
      scales: {
        y: {min:0, max:100, ticks:{color:'#a09890',fontSize:10}, grid:{color:'#2a2a38'}},
        x: {ticks:{color:'#a09890',fontSize:10}, grid:{display:false}}
      }
    }
  });
}

  document.getElementById('gallery-empty').style.display = 'none';
  const col = currentSort === 'score' ? 'score' : 'created_at';
  const { data } = await _supabase.from('photos').select('*').eq('user_id', currentUser.id).order(col, {ascending:false});
  document.getElementById('gallery-loading').style.display = 'none';
  if (!data || !data.length) { document.getElementById('gallery-empty').style.display = 'block'; return; }
  window._gallery = {};
  data.forEach(p => { window._gallery[p.id] = p; });
  document.getElementById('gallery-grid').innerHTML = data.map(p =>
    `<div class="gallery-item" onclick="openDetail('${p.id}')">
      <img class="gallery-img" src="${p.image_url}" loading="lazy" onerror="this.onerror=null;this.style.background='var(--bg3)';this.style.minHeight='120px'">
      <div class="gallery-info">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="gallery-score">${p.score}点</div>
          <button class="delete-btn" onclick="event.stopPropagation();deletePhoto('${p.id}')">🗑️</button>
        </div>
        <div class="gallery-date">📅 ${formatDate(p.created_at)}</div>
      </div>
    </div>`
  ).join('');
}

function openDetail(id) {
  const p = window._gallery[id];
  if (!p) return;
  document.getElementById('modal-img').src = p.image_url;
  document.getElementById('modal-score').textContent = p.score + '点';
  const grade = getGrade(p.score);
  document.getElementById('modal-grade').textContent = grade.label;
  document.getElementById('modal-grade').style.color = grade.color;
  document.getElementById('modal-date').textContent = '📅 ' + formatDate(p.created_at);
  const adv = document.getElementById('modal-advice');
  adv.style.whiteSpace = 'pre-line';
  adv.textContent = p.advice || '';
  const items = [
    {name:'明るさ',val:p.brightness},{name:'彩度',val:p.saturation},
    {name:'コントラスト',val:p.contrast},{name:'構図',val:p.composition},
    {name:'シャープ',val:p.sharpness}
  ];
  document.getElementById('modal-breakdown').innerHTML = items.map(b =>
    `<div class="score-item"><div class="score-item-name">${b.name}</div>
    <div class="score-bar-wrap"><div class="score-bar" style="width:${b.val||0}%"></div></div>
    <div class="score-item-val">${b.val||0}点</div></div>`
  ).join('');
  document.getElementById('detail-modal').classList.add('open');
}

function closeModalBg(e) {
  if (e.target === document.getElementById('detail-modal'))
    document.getElementById('detail-modal').classList.remove('open');
}

async function deletePhoto(id) {
  if (!confirm('この写真を削除しますか？')) return;
  const { error } = await _supabase.from('photos').delete().eq('id', id).eq('user_id', currentUser.id);
  if (error) { showToast('削除失敗'); return; }
  showToast('🗑️ 削除しました');
  delete window._gallery[id];
  await loadHomeStats();
  loadGallery();
}

// ===== NAVIGATION =====
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'gallery') loadGallery();
  if (name === 'home') loadHomeStats();
  if (name === 'upload' && !pendingImageData) {
    document.getElementById('upload-area').style.display = 'block';
    document.getElementById('preview-container').style.display = 'none';
    document.getElementById('score-result').style.display = 'none';
    document.getElementById('scoring-loading').style.display = 'none';
  }
}

// ===== UTILS =====
function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ===== ログインボタンをbody読み込み完了後に設定 =====
window.addEventListener('load', function() {
  document.getElementById('auth-btn').addEventListener('click', doAuth);
});
</script>
</body>
