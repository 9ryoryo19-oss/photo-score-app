<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhotoGrow</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>


    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --accent: #c8a96e;
      --accent2: #e8c88e;
      --text: #f0ede8;
      --text2: #a09890;
      --border: #2a2a38;
      --gold: #c8a96e;
      --success: #5cb88a;
      --danger: #e07070;
      --radius: 16px;
      --shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== AUTH ===== */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 50% 0%, #1a1530 0%, var(--bg) 70%);
      position: relative;
      z-index: 500;
    }

    .auth-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .auth-logo svg { width: 40px; height: 40px; }

    .auth-tagline {
      color: var(--text2);
      font-size: 0.95rem;
      margin-bottom: 48px;
      text-align: center;
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
    }

    .auth-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text2);
    }

    .auth-switch span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
    }

    .auth-error {
      background: rgba(224,112,112,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    /* ===== MAIN APP ===== */
    #app { display: none; min-height: 100vh; padding-bottom: 80px; position: relative; z-index: 1; }

    /* Header */
    .app-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      cursor: pointer;
      transition: color 0.2s;
      color: var(--text2);
      font-size: 0.7rem;
      font-weight: 500;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.4rem; }

    /* Pages */
    .page { display: none; padding: 20px; }
    .page.active { display: block; }

    /* ===== HOME PAGE ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 12px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text2);
      margin-top: 4px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* Badge */
    .badges-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 24px;
      scrollbar-width: none;
    }

    .badge-item {
      flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      min-width: 80px;
    }

    .badge-item.earned { border-color: var(--gold); }
    .badge-icon { font-size: 1.8rem; }
    .badge-name { font-size: 0.65rem; color: var(--text2); margin-top: 4px; }
    .badge-item.earned .badge-name { color: var(--gold); }

    /* Chart */
    .chart-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    /* ===== UPLOAD PAGE ===== */
    .upload-area {
      background: var(--bg2);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
      position: relative;
    }

    .upload-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .upload-btn-card {
      background: var(--bg3);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-btn-card:active { border-color: var(--accent); background: var(--bg2); }
    .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .upload-text { font-size: 0.9rem; color: var(--text2); font-weight: 500; }

    .preview-container {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
      display: none;
    }

    .preview-container img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: var(--radius);
    }

    .preview-remove {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Score Result */
    .score-result {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      display: none;
    }

    .score-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--score) * 3.6deg), var(--bg3) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }

    .score-circle::before {
      content: '';
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg2);
    }

    .score-number {
      position: relative;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      z-index: 1;
    }

    .score-grade {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .score-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .score-item {
      background: var(--bg3);
      border-radius: 10px;
      padding: 12px;
    }

    .score-item-name {
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .score-bar-wrap {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    .score-item-val {
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 4px;
      color: var(--accent);
    }

    .advice-section { margin-top: 16px; }
    .advice-title { font-size: 0.8rem; color: var(--text2); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .advice-text { font-size: 0.9rem; line-height: 1.6; color: var(--text); }

    .btn-save {
      width: 100%;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:active { transform: scale(0.98); }

    /* ===== GALLERY ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .gallery-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gallery-item:active { transform: scale(0.97); }

    .gallery-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .gallery-info {
      padding: 10px;
    }

    .gallery-score {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--accent);
    }

    .gallery-date {
      font-size: 0.72rem;
      color: var(--text2);
      margin-top: 2px;
    }

    .delete-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .delete-btn:active { opacity: 1; }

    /* Detail Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }

    .modal.open { display: flex; }

    .modal-content {
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
      max-height: 250px;
      object-fit: cover;
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      color: var(--text);
      z-index: 300;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Rank badge */
    .rank-banner {
      background: linear-gradient(135deg, #1a1530, #0a0a0f);
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .rank-icon { font-size: 2.5rem; }

    .rank-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
    }

    .rank-desc { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }

    .page-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: var(--text);
    }

    .sort-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .sort-tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .sort-tab.active {
      background: var(--accent);
      color: #0a0a0f;
      border-color: var(--accent);
      font-weight: 600;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  
  
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pgDash{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-250}}
@keyframes pgRotate{0%,100%{transform:rotate(0deg)}50%{transform:rotate(180deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect x="2" y="10" width="32" height="22" rx="4" fill="none" stroke="#c8a96e" stroke-width="1.8"/>
      <circle cx="18" cy="21" r="6" fill="none" stroke="#c8a96e" stroke-width="1.8"/>
      <circle cx="18" cy="21" r="2.5" fill="#c8a96e" opacity="0.7"/>
      <path d="M11 10 L13 6 H23 L25 10" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="29" cy="15" r="2" fill="#c8a96e"/>
    </svg>
    PhotoGrow
  </div>
  <div class="auth-tagline">風景写真で成長する、あなたの記録</div>
  <div class="auth-card">
    <div class="auth-title" id="auth-title">ログイン</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group" id="name-group" style="display:none">
      <label>ニックネーム</label>
      <input type="text" id="input-name" placeholder="あなたの名前">
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="input-email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="input-password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="auth-btn">ログイン</button>
    <div class="auth-switch" id="auth-switch">
      アカウントがない方は <span id="toggle-link" style="color:var(--accent);cursor:pointer">新規登録</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="app-header-logo">
      <svg width="22" height="22" viewBox="0 0 36 36" fill="none" style="margin-right:6px;vertical-align:middle">
        <rect x="2" y="10" width="32" height="22" rx="4" fill="none" stroke="#c8a96e" stroke-width="1.8"/>
        <circle cx="18" cy="21" r="6" fill="none" stroke="#c8a96e" stroke-width="1.8"/>
        <circle cx="18" cy="21" r="2.5" fill="#c8a96e" opacity="0.7"/>
        <path d="M11 10 L13 6 H23 L25 10" stroke="#c8a96e" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="29" cy="15" r="2" fill="#c8a96e"/>
      </svg>
      PhotoGrow
    </div>
    <div class="user-avatar" id="user-avatar">?</div>
  </header>

  <div class="page active" id="page-home">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="stat-count">0</div><div class="stat-label">撮影枚数</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-avg">—</div><div class="stat-label">平均スコア</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-best">—</div><div class="stat-label">最高スコア</div></div>
    </div>
    <div class="rank-banner">
      <div class="rank-icon" id="rank-icon">🌱</div>
      <div><div class="rank-name" id="rank-name">ビギナー</div><div class="rank-desc" id="rank-desc">まずは1枚目を撮ってみよう！</div></div>
    </div>
    <div class="section-title">🏅 バッジ</div>
    <div class="badges-row" id="badges-row"></div>
    <div class="section-title">📈 スコア推移</div>
    <div class="chart-card"><canvas id="score-chart" height="180"></canvas></div>
  </div>

  <div class="page" id="page-upload">
    <div class="page-header">写真を採点する</div>
    <div id="upload-area">
      <div class="upload-btn-row">
        <div class="upload-btn-card" id="btn-library">
          <input type="file" id="file-lib" accept="image/*" style="display:none">
          <div class="upload-icon">🖼️</div><div class="upload-text">写真ライブラリ</div>
        </div>
        <div class="upload-btn-card" id="btn-camera">
          <input type="file" id="file-cam" accept="image/*" capture="environment" style="display:none">
          <div class="upload-icon">📷</div><div class="upload-text">カメラで撮影</div>
        </div>
      </div>
    </div>
    <div class="preview-container" id="preview-container">
      <img id="preview-img" src="" alt="">
      <button class="preview-remove" id="btn-remove">✕</button>
    </div>
    <div class="loading" id="scoring-loading"><div class="spinner"></div><div>採点中...</div></div>
    <div class="score-result" id="score-result">
      <div class="score-circle" id="score-circle"><div class="score-number" id="score-number">0</div></div>
      <div class="score-grade" id="score-grade">—</div>
      <div id="location-display" style="display:none;font-size:0.9rem;color:var(--accent);margin:8px 0;text-align:center;font-weight:500"></div>
      <div class="score-breakdown" id="score-breakdown"></div>
      <div class="advice-section">
        <div class="advice-title">💡 アドバイス</div>
        <div class="advice-text" id="advice-text"></div>
      </div>
      <button class="btn-save" id="btn-save" style="margin-top:20px">💾 成長記録に保存する</button>
    </div>
  </div>

  <div class="page" id="page-gallery">
    <div class="page-header">ギャラリー</div>
    <div class="sort-tabs">
      <div class="sort-tab active" id="tab-latest">🕐 最新順</div>
      <div class="sort-tab" id="tab-score">🏆 高得点順</div>
    </div>
    <div class="loading" id="gallery-loading"><div class="spinner"></div><div>読み込み中...</div></div>
    <div class="gallery-grid" id="gallery-grid"></div>

// ===== 採点エンジン =====
function analyzeAndScore(imageEl) {
  return new Promise(function(resolve) {
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    var MAX = 200;
    var scale = Math.min(MAX / imageEl.naturalWidth, MAX / imageEl.naturalHeight, 1);
    canvas.width = imageEl.naturalWidth * scale;
    canvas.height = imageEl.naturalHeight * scale;
    ctx.drawImage(imageEl, 0, 0, canvas.width, canvas.height);

    var data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    var pixels = data.length / 4;

    var rSum=0, gSum=0, bSum=0;
    var brightnessValues = [];
    var satValues = [];
    var contrastData = [];

    for (let i = 0; i < data.length; i += 4) {
      var r = data[i], g = data[i+1], b = data[i+2];
      rSum += r; gSum += g; bSum += b;

      var max = Math.max(r,g,b), min = Math.min(r,g,b);
      var brightness = (max + min) / 2 / 255;
      brightnessValues.push(brightness);

      var sat = max === 0 ? 0 : (max - min) / max;
      satValues.push(sat);
      contrastData.push((r + g + b) / 3);
    }

    var avgBrightness = brightnessValues.reduce(function(a,b){return a+b;},0) / pixels;
    var brightScore = Math.round(100 - Math.abs(avgBrightness - 0.5) * 160);

    var avgSat = satValues.reduce(function(a,b){return a+b;},0) / pixels;
    var satScore = Math.round(Math.min(avgSat * 180, 100));

    var meanContrast = contrastData.reduce(function(a,b){return a+b;},0) / pixels;
    var variance = contrastData.reduce(function(a,b){return a + Math.pow(b-meanContrast, 2);}, 0) / pixels;
    var contrastScore = Math.round(Math.min(Math.sqrt(variance) / 60 * 100, 100));

    var aspect = imageEl.naturalWidth / imageEl.naturalHeight;
    var idealAspects = [1, 4/3, 3/2, 16/9];
    var aspectDiff = Math.min.apply(null, idealAspects.map(function(a){return Math.abs(aspect - a);}));
    var compositionScore = Math.round(Math.max(100 - aspectDiff * 80, 40));

    var edgeSum = 0;
    for (let y = 1; y < canvas.height - 1; y++) {
      for (let x = 1; x < canvas.width - 1; x++) {
        var curr = contrastData[y * canvas.width + x];
        var right = contrastData[y * canvas.width + x + 1];
        var down = contrastData[(y+1) * canvas.width + x];
        edgeSum += Math.abs(curr - right) + Math.abs(curr - down);
      }
    }
    var avgEdge = edgeSum / (canvas.width * canvas.height);
    var sharpnessScore = Math.round(Math.min(avgEdge / 15 * 100, 100));

    var total = Math.round(
      brightScore * 0.25 +
      satScore * 0.20 +
      contrastScore * 0.20 +
      compositionScore * 0.20 +
      sharpnessScore * 0.15
    );

    var scores = {
      total: Math.max(20, Math.min(total, 100)),
      brightness: Math.max(20, brightScore),
      saturation: Math.max(20, satScore),
      contrast: Math.max(20, contrastScore),
      composition: Math.max(20, compositionScore),
      sharpness: Math.max(20, sharpnessScore),
    };

    var advices = [];

    if (scores.brightness < 35) advices.push('【明るさ：深刻】写真全体が暗すぎます。マジックアワー（日の出・日没直後）やゴールデンアワーを狙うか、露出補正を+1〜2段上げてください。暗い写真は後処理でも限界があります。');
    else if (scores.brightness < 50) advices.push('【明るさ：不足】露出が足りていません。カメラのISOを上げるか、シャッタースピードを遅くして光を多く取り込みましょう。風景では三脚を使った長秒露光も有効です。');
    else if (scores.brightness > 88) advices.push('【明るさ：飛びすぎ】白飛びしている可能性が高いです。露出補正を-1段下げ、ハイライトを守ってください。空の白飛びは後処理では回復不可能です。');
    else if (scores.brightness > 75) advices.push('【明るさ：やや明るい】少し露出オーバーです。-0.3〜-0.7段絞ることで、空や雲のディテールを保持できます。');
    else advices.push('【明るさ：良好】露出は適切です。次は光の方向性（順光・逆光・サイド光）を意識すると、さらに立体感のある写真になります。');

    if (scores.saturation < 25) advices.push('【彩度：非常に低い】色味がほぼない状態です。モノクロ写真として仕上げるか、晴天の青空や夕焼けを背景に撮影しましょう。曇りの日は意図的にモノクロ変換が効果的です。');
    else if (scores.saturation < 45) advices.push('【彩度：不足】色の鮮やかさが足りません。被写体の色が映える時間帯（午前・夕方）を選ぶか、編集で彩度を+20〜30上げてみましょう。ただし不自然な過彩度は避けること。');
    else if (scores.saturation > 80) advices.push('【彩度：鮮やか】色彩が豊かで視線を引きます。ただし彩度が高すぎると不自然に見えることも。プリントや画面環境によって見え方が変わるので確認を。');
    else advices.push('【彩度：良好】色のバランスが取れています。ホワイトバランスを被写体の色温度に合わせると、さらに自然な発色になります。');

    if (scores.contrast < 30) advices.push('【コントラスト：非常に低い】全体的にのっぺりした印象です。RAW撮影してトーンカーブで暗部を下げ明部を上げるS字カーブをかけましょう。または偏光フィルターを使って反射を抑えると効果的です。');
    else if (scores.contrast < 50) advices.push('【コントラスト：不足】明暗差が少なく、立体感に欠けます。被写体に対して横から光を当てるサイド光を意識し、影を活かした構図にしましょう。');
    else if (scores.contrast > 80) advices.push('【コントラスト：強い】ダイナミックな仕上がりです。ただし暗部が潰れていないか確認を。HDR合成や段階露出で暗部を補うとバランスが取れます。');
    else advices.push('【コントラスト：良好】明暗のバランスが取れています。被写体の質感を出すには、光の角度を変えてみることをおすすめします。');

    if (scores.sharpness < 30) advices.push('【シャープネス：深刻】明らかにブレています。三脚必須です。またシャッタースピードを被写体の動きに合わせて設定し（動体なら1/500秒以上）、セルフタイマーやリモコンでシャッターを切りましょう。');
    else if (scores.sharpness < 50) advices.push('【シャープネス：不足】ピントが甘いか手ブレがあります。一眼カメラではAFポイントを主題に合わせ、iPhoneでは画面タップでピント合わせを確認してください。');
    else if (scores.sharpness > 75) advices.push('【シャープネス：優秀】くっきりと解像しています。主題を際立たせるために、前景と背景のボケ（深度）も意識してみましょう。');
    else advices.push('【シャープネス：良好】ピントは合っています。次は被写界深度（どこからどこまでピントを合わせるか）をコントロールすることを意識しましょう。');

    if (scores.total >= 85) advices.push('【総合】プロレベルに近い仕上がりです。光・構図・色の三要素が高水準で揃っています。SNSや作品展示にも十分通用します。');
    else if (scores.total >= 70) advices.push('【総合】上級アマチュアレベルです。あと一歩の完成度。弱点の項目に集中して改善すれば、大きくスコアが上がります。');
    else if (scores.total >= 55) advices.push('【総合】中級者レベルです。基本は押さえられていますが、光の読み方と構図の意図が弱い。撮影前に「何を伝えたいか」を決めてからシャッターを切る習慣をつけましょう。');
    else if (scores.total >= 40) advices.push('【総合】初級者レベルです。今は量より質を意識して。1回の外出で100枚撮るより、10枚を丁寧に撮る練習をしてください。三分割法を意識した構図から始めましょう。');
    else advices.push('【総合】基礎から見直しが必要です。まずは晴れた日の昼間に、明るく・ブレない写真を撮ることだけを目標にしてください。設定はフルオートでOKです。');

    scores.advice = advices.join('\n\n');
    resolve(scores);
  });
}



// ===== GPS =====
// EXIF GPS読み取り
function readExifGPS(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var view = new DataView(e.target.result);
        if (view.getUint16(0) !== 0xFFD8) { resolve(null); return; }
        var offset = 2, len = view.byteLength;
        while (offset < len) {
          if (view.getUint16(offset) === 0xFFE1) {
            var exifLen = view.getUint16(offset + 2);
            var exif = new DataView(e.target.result, offset + 4, exifLen - 2);
            var exifStr = '';
            for (var i = 0; i < 4; i++) exifStr += String.fromCharCode(exif.getUint8(i));
            if (exifStr !== 'Exif') { resolve(null); return; }
            var le = exif.getUint16(6) === 0x4949;
            var ifdOffset = exif.getUint32(10, le) + 6;
            var entries = exif.getUint16(ifdOffset, le);
            var gpsOffset = null;
            for (var j = 0; j < entries; j++) {
              var tag = exif.getUint16(ifdOffset + 2 + j * 12, le);
              if (tag === 0x8825) { gpsOffset = exif.getUint32(ifdOffset + 2 + j * 12 + 8, le) + 6; break; }
            }
            if (!gpsOffset) { resolve(null); return; }
            var gpsEntries = exif.getUint16(gpsOffset, le);
            var lat = null, lon = null, latRef = 'N', lonRef = 'E';
            for (var k = 0; k < gpsEntries; k++) {
              var gpsTag = exif.getUint16(gpsOffset + 2 + k * 12, le);
              var gpsValOffset = gpsOffset + 2 + k * 12 + 8;
              if (gpsTag === 1) latRef = String.fromCharCode(exif.getUint8(gpsValOffset));
              if (gpsTag === 3) lonRef = String.fromCharCode(exif.getUint8(gpsValOffset));
              if (gpsTag === 2 || gpsTag === 4) {
                var voff = exif.getUint32(gpsValOffset, le) + 6;
                var d = exif.getUint32(voff, le) / exif.getUint32(voff + 4, le);
                var m = exif.getUint32(voff + 8, le) / exif.getUint32(voff + 12, le);
                var s2 = exif.getUint32(voff + 16, le) / exif.getUint32(voff + 20, le);
                var deg = d + m / 60 + s2 / 3600;
                if (gpsTag === 2) lat = deg;
                else lon = deg;
              }
            }
            if (lat !== null && lon !== null) {
              if (latRef === 'S') lat = -lat;
              if (lonRef === 'W') lon = -lon;
              resolve({lat: lat, lon: lon});
            } else { resolve(null); }
            return;
          }
          offset += 2 + view.getUint16(offset + 2);
        }
        resolve(null);
      } catch(e) { resolve(null); }
    };
    reader.readAsArrayBuffer(file.slice(0, 65536));
  });
}

// 緯度経度から地名を取得
function getLocationName(lat, lon) {
  return fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=ja', {
    headers: { 'User-Agent': 'PhotoGrow/1.0' }
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    if (!d || !d.address) return null;
    var a = d.address;
    return a.city || a.town || a.village || a.county || a.state || d.display_name || null;
  }).catch(function() { return null; });
}



function processFile(file) {
  gPendingLoc=null;
  readExifGPS(file).then(function(gps){
    if(gps) return getLocationName(gps.lat,gps.lon).then(function(name){
      if(name){
        gPendingLoc=name;
        var el=document.getElementById('location-display');
        if(el){el.textContent='📍 '+name;el.style.display='block';}
      }
    });
  }).catch(function(){});
  var reader=new FileReader();
  reader.onload=function(ev){
    gPendingImg=ev.target.result;
    var img=document.getElementById('preview-img');
    img.src=gPendingImg;
    document.getElementById('preview-container').style.display='block';
    document.getElementById('upload-area').style.display='none';
    document.getElementById('score-result').style.display='none';
    img.onload=function(){
      document.getElementById('scoring-loading').style.display='block';
      analyzeAndScore(img).then(function(s){
        gPendingScore=s; showScore(s);
        document.getElementById('scoring-loading').style.display='none';
      }).catch(function(e){
        toast('採点エラー: '+e.message);
        document.getElementById('scoring-loading').style.display='none';
      });
    };
  };
  reader.readAsDataURL(file);
}

function showScore(s) {
  document.getElementById('score-result').style.display='block';
  document.getElementById('score-circle').style.setProperty('--score',s.total);
  document.getElementById('score-number').textContent=s.total;
  var gr=grade(s.total);
  document.getElementById('score-grade').textContent=gr.label;
  document.getElementById('score-grade').style.color=gr.color;
  var items=[{n:'明るさ',k:'brightness'},{n:'彩度',k:'saturation'},{n:'コントラスト',k:'contrast'},{n:'構図',k:'composition'},{n:'シャープ',k:'sharpness'}];
  document.getElementById('score-breakdown').innerHTML=items.map(function(b){
    return '<div class="score-item"><div class="score-item-name">'+b.n+'</div><div class="score-bar-wrap"><div class="score-bar" style="width:'+s[b.k]+'%"></div></div><div class="score-item-val">'+s[b.k]+'点</div></div>';
  }).join('');
  var adv=document.getElementById('advice-text');
  adv.style.whiteSpace='pre-line'; adv.textContent=s.advice;
}

function resetUpload() {
  gPendingImg=null; gPendingScore=null; gPendingLoc=null;
  document.getElementById('preview-container').style.display='none';
  document.getElementById('upload-area').style.display='block';
  document.getElementById('score-result').style.display='none';
  var el=document.getElementById('location-display');
  if(el){el.style.display='none';el.textContent='';}
  document.getElementById('file-lib').value='';
  document.getElementById('file-cam').value='';
}

function doSave() {
  if(!gPendingImg||!gPendingScore)return;
  var btn=document.getElementById('btn-save');
  btn.textContent='保存中...'; btn.disabled=true;
  function save(url){
    sbPost('photos',{
      user_id:gUser.id,image_url:url,
      score:gPendingScore.total,brightness:gPendingScore.brightness,
      saturation:gPendingScore.saturation,contrast:gPendingScore.contrast,
      composition:gPendingScore.composition,sharpness:gPendingScore.sharpness,
      advice:gPendingScore.advice,location_name:gPendingLoc||null,
      created_at:new Date().toISOString()
    }).then(function(){
      toast('✅ 保存しました！');
      gPendingImg=null; gPendingScore=null; gPendingLoc=null;
      resetUpload(); loadStats(); goPage('gallery');
    }).catch(function(e){toast('保存失敗: '+e.message);})
    .finally(function(){btn.textContent='💾 成長記録に保存する';btn.disabled=false;});
  }
  var arr=gPendingImg.split(','),mime=arr[0].match(/:(.*?);/)[1],bstr=atob(arr[1]),n=bstr.length,u8=new Uint8Array(n);
  while(n--)u8[n]=bstr.charCodeAt(n);
  var fd=new FormData(); fd.append('file',new Blob([u8],{type:mime})); fd.append('upload_preset',CP);
  fetch('https://api.cloudinary.com/v1_1/'+CC+'/image/upload',{method:'POST',body:fd})
    .then(function(r){return r.json();}).then(function(d){save(d.secure_url||'');}).catch(function(){save('');});
}

// ===== 既存アドバイス更新 =====
function makeAdvice(b,s,c,comp,sh,total) {
  var a=[];
  if(b<35)a.push('【明るさ：深刻】写真全体が暗すぎます。マジックアワー（日の出・日没直後）を狙うか、露出補正を+1〜2段上げてください。');
  else if(b<50)a.push('【明るさ：不足】露出が足りていません。ISOを上げるか、シャッタースピードを遅くして光を多く取り込みましょう。');
  else if(b>88)a.push('【明るさ：飛びすぎ】白飛びしている可能性が高いです。露出補正を-1段下げ、ハイライトを守ってください。');
  else if(b>75)a.push('【明るさ：やや明るい】少し露出オーバーです。-0.3〜-0.7段絞ることで空や雲のディテールを保持できます。');
  else a.push('【明るさ：良好】露出は適切です。光の方向性（順光・逆光・サイド光）を意識すると立体感が増します。');
  if(s<25)a.push('【彩度：非常に低い】色味がほぼない状態です。晴天の青空や夕焼けを背景に撮影しましょう。');
  else if(s<45)a.push('【彩度：不足】色の鮮やかさが足りません。被写体の色が映える時間帯（午前・夕方）を選びましょう。');
  else if(s>80)a.push('【彩度：鮮やか】色彩が豊かで視線を引きます。不自然な過彩度にならないよう注意を。');
  else a.push('【彩度：良好】色のバランスが取れています。ホワイトバランスを合わせるとさらに自然な発色になります。');
  if(c<30)a.push('【コントラスト：非常に低い】全体的にのっぺりした印象です。トーンカーブでS字カーブをかけましょう。');
  else if(c<50)a.push('【コントラスト：不足】明暗差が少なく立体感に欠けます。サイド光を意識した構図にしましょう。');
  else if(c>80)a.push('【コントラスト：強い】ダイナミックな仕上がりです。暗部が潰れていないか確認してください。');
  else a.push('【コントラスト：良好】明暗のバランスが取れています。光の角度を変えて質感を出してみましょう。');
  if(sh<30)a.push('【シャープネス：深刻】明らかにブレています。三脚必須です。セルフタイマーでシャッターを切りましょう。');
  else if(sh<50)a.push('【シャープネス：不足】ピントが甘いか手ブレがあります。iPhoneでは画面タップでピント合わせを確認してください。');
  else if(sh>75)a.push('【シャープネス：優秀】くっきりと解像しています。前景と背景のボケも意識してみましょう。');
  else a.push('【シャープネス：良好】ピントは合っています。被写界深度のコントロールを意識しましょう。');
  if(total>=85)a.push('【総合】プロレベルに近い仕上がりです。SNSや作品展示にも十分通用します。');
  else if(total>=70)a.push('【総合】上級アマチュアレベルです。弱点の項目を集中して改善すると大きくスコアが上がります。');
  else if(total>=55)a.push('【総合】中級者レベルです。撮影前に「何を伝えたいか」を決めてからシャッターを切る習慣をつけましょう。');
  else if(total>=40)a.push('【総合】初級者レベルです。三分割法を意識した構図から始めましょう。');
  else a.push('【総合】基礎から見直しが必要です。まずは明るく・ブレない写真を撮ることを目標にしてください。');
  return a.join('\n\n');
}

function updateOldAdvice() {
  sbGet('photos?select=id,brightness,saturation,contrast,composition,sharpness,score,advice&user_id=eq.'+gUser.id)
    .then(function(data){
      if(!Array.isArray(data))return;
      data.forEach(function(p){
        if(p.brightness&&(!p.advice||p.advice.indexOf('【')===-1)){
          sbPatch('photos?id=eq.'+p.id,{advice:makeAdvice(p.brightness,p.saturation,p.contrast,p.composition,p.sharpness,p.score)}).catch(function(){});
        }
      });
    }).catch(function(){});
}
